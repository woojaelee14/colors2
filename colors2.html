<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Color Palette</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1e1e1e;
      color: #ddd;
      padding: 24px;
    }

    .palette-wrap {
      max-width: 660px;
      margin: 0 auto;
    }

    .palette-title {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 20px;
    }

    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* ── 색상 스펙트럼 바 ── */
    .hue-bar-wrap { margin-bottom: 16px; }

    .hue-bar {
      width: 100%;
      height: 22px;
      border-radius: 4px;
      background: linear-gradient(to right,
        #ff0000, #ff8000, #ffff00, #80ff00,
        #00ff00, #00ff80, #00ffff, #0080ff,
        #0000ff, #8000ff, #ff00ff, #ff0080, #ff0000);
      position: relative;
      cursor: crosshair;
      user-select: none;
    }

    .hue-cursor {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 28px;
      background: #fff;
      border-radius: 3px;
      border: 2px solid #555;
      pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ── 채도·명도 피커 ── */
    .picker-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .sb-wrap {
      width: 300px;
      height: 220px;
      border-radius: 6px;
      position: relative;
      cursor: crosshair;
      flex-shrink: 0;
      user-select: none;
    }

    .sb-base,
    .sb-grad-white,
    .sb-grad-black {
      position: absolute;
      inset: 0;
      border-radius: 6px;
    }

    .sb-grad-white { background: linear-gradient(to right, #fff, transparent); }
    .sb-grad-black { background: linear-gradient(to bottom, transparent, #000); }

    .sb-cursor {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ── 색상 정보 패널 ── */
    .color-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .color-preview-box {
      height: 90px;
      border-radius: 6px;
      border: 1px solid #444;
    }

    .value-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .value-label {
      font-size: 11px;
      color: #888;
      width: 32px;
      flex-shrink: 0;
    }

    .value-input {
      flex: 1;
      background: #2c2c2c;
      border: 1px solid #444;
      color: #eee;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .btn-copy {
      background: #1a6fe8;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      flex-shrink: 0;
    }

    .btn-copy:hover { background: #1558c0; }

    /* ── 기본 24색 ── */
    .basic-colors-wrap { margin-bottom: 16px; }

    .basic-colors-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .basic-swatch {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
    }

    .basic-swatch:hover {
      transform: scale(1.2);
      border-color: #fff;
    }

    /* ── 저장된 색상 ── */
    .save-section { margin-top: 4px; }

    .btn-save {
      background: #1a6fe8;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .btn-save:hover { background: #1558c0; }

    .saved-colors-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 40px;
    }

    .saved-swatch {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid #444;
      transition: border-color 0.1s, transform 0.1s;
    }

    .saved-swatch:hover {
      border-color: #fff;
      transform: scale(1.1);
    }

    .saved-empty {
      color: #555;
      font-size: 12px;
      line-height: 36px;
    }
  </style>
</head>
<body>
  <div class="palette-wrap">
    <div class="palette-title">Color Palette</div>

    <!-- 색상 스펙트럼 -->
    <div class="hue-bar-wrap">
      <div class="section-label">색상 스펙트럼</div>
      <div class="hue-bar" id="hueBar">
        <div class="hue-cursor" id="hueCursor"></div>
      </div>
    </div>

    <!-- 채도·명도 피커 + 색상 정보 -->
    <div class="picker-row">
      <div class="sb-wrap" id="sbWrap">
        <div class="sb-base" id="sbBase"></div>
        <div class="sb-grad-white"></div>
        <div class="sb-grad-black"></div>
        <div class="sb-cursor" id="sbCursor"></div>
      </div>

      <div class="color-info">
        <div class="color-preview-box" id="colorPreview"></div>
        <div class="value-row">
          <span class="value-label">HEX</span>
          <input class="value-input" id="hexInput" readonly>
          <button class="btn-copy" onclick="copyValue('hexInput', this)">복사</button>
        </div>
        <div class="value-row">
          <span class="value-label">RGB</span>
          <input class="value-input" id="rgbInput" readonly>
          <button class="btn-copy" onclick="copyValue('rgbInput', this)">복사</button>
        </div>
      </div>
    </div>

    <!-- 기본 24색 -->
    <div class="basic-colors-wrap">
      <div class="section-label">기본 24색</div>
      <div class="basic-colors-grid" id="basicColorsGrid"></div>
    </div>

    <!-- 저장된 색상 -->
    <div class="save-section">
      <div class="section-label">저장된 색상</div>
      <button class="btn-save" onclick="saveCurrentColor()">현재 색 저장</button>
      <div class="saved-colors-grid" id="savedColorsGrid">
        <span class="saved-empty" id="savedEmpty">저장된 색상이 없습니다</span>
      </div>
    </div>
  </div>

  <script>
    let curHue = 200, curSat = 0.65, curVal = 0.85;

    const basicColorList = [
      '#FF0000','#FF4500','#FF8C00','#FFA500',
      '#FFD700','#FFFF00','#ADFF2F','#7CFC00',
      '#00FF00','#00FA9A','#00FFFF','#00BFFF',
      '#1E90FF','#0000FF','#6A0DAD','#9400D3',
      '#FF00FF','#FF1493','#FF69B4','#8B4513',
      '#808080','#C0C0C0','#FFFFFF','#000000'
    ];

    // 기본 24색 렌더링
    const basicGrid = document.getElementById('basicColorsGrid');
    basicColorList.forEach(hex => {
      const div = document.createElement('div');
      div.className = 'basic-swatch';
      div.style.background = hex;
      div.title = hex;
      div.onclick = () => applyHex(hex);
      basicGrid.appendChild(div);
    });

    // HSV → RGB
    function hsvToRgb(h, s, v) {
      const i = Math.floor(h / 60) % 6;
      const f = h / 60 - Math.floor(h / 60);
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);
      const m = [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i];
      return { r: Math.round(m[0]*255), g: Math.round(m[1]*255), b: Math.round(m[2]*255) };
    }

    // RGB → HSV
    function rgbToHsv(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      let h = 0;
      const s = max === 0 ? 0 : d / max;
      const v = max;
      if (d !== 0) {
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: h * 360, s, v };
    }

    function toHex(r, g, b) {
      return '#' + [r, g, b].map(n => n.toString(16).padStart(2, '0')).join('');
    }

    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16)
      };
    }

    function applyHex(hex) {
      const { r, g, b } = hexToRgb(hex);
      const hsv = rgbToHsv(r, g, b);
      curHue = hsv.h; curSat = hsv.s; curVal = hsv.v;
      refreshAll();
    }

    function refreshAll() {
      const { r, g, b } = hsvToRgb(curHue, curSat, curVal);
      const hex = toHex(r, g, b);

      document.getElementById('colorPreview').style.background = hex;
      document.getElementById('hexInput').value = hex.toUpperCase();
      document.getElementById('rgbInput').value = `rgb(${r}, ${g}, ${b})`;
      document.getElementById('sbBase').style.background = `hsl(${curHue}, 100%, 50%)`;
      document.getElementById('hueCursor').style.left = (curHue / 360 * 100) + '%';
      document.getElementById('sbCursor').style.left = (curSat * 100) + '%';
      document.getElementById('sbCursor').style.top = ((1 - curVal) * 100) + '%';
    }

    // 색상 스펙트럼 드래그
    const hueBar = document.getElementById('hueBar');
    let hueDragging = false;

    function handleHue(e) {
      const rect = hueBar.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      curHue = (x / rect.width) * 360;
      refreshAll();
    }

    hueBar.addEventListener('mousedown', e => { hueDragging = true; handleHue(e); });
    document.addEventListener('mousemove', e => { if (hueDragging) handleHue(e); });
    document.addEventListener('mouseup', () => { hueDragging = false; });

    // 채도·명도 피커 드래그
    const sbWrap = document.getElementById('sbWrap');
    let sbDragging = false;

    function handleSb(e) {
      const rect = sbWrap.getBoundingClientRect();
      const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      const y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
      curSat = x / rect.width;
      curVal = 1 - y / rect.height;
      refreshAll();
    }

    sbWrap.addEventListener('mousedown', e => { sbDragging = true; handleSb(e); });
    document.addEventListener('mousemove', e => { if (sbDragging) handleSb(e); });
    document.addEventListener('mouseup', () => { sbDragging = false; });

    // 복사
    function copyValue(inputId, btn) {
      const txt = document.getElementById(inputId).value;
      navigator.clipboard.writeText(txt).then(() => {
        const orig = btn.textContent;
        btn.textContent = '완료!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    // 색상 저장
    function saveCurrentColor() {
      const hex = document.getElementById('hexInput').value;
      const emptyEl = document.getElementById('savedEmpty');
      if (emptyEl) emptyEl.remove();

      const div = document.createElement('div');
      div.className = 'saved-swatch';
      div.style.background = hex;
      div.title = hex;
      div.onclick = () => applyHex(hex.toLowerCase());
      document.getElementById('savedColorsGrid').appendChild(div);
    }

    // 초기화
    refreshAll();
  </script>
</body>
</html>
